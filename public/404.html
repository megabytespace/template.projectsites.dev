<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="robots" content="noindex,follow">
  <title>Page not found — {BUSINESS_NAME}</title>
  <meta name="description" content="The page you were looking for doesn't exist. Try the homepage or the sitemap.">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#0a0a1a;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;position:relative;overflow:hidden}
    body::before,body::after{content:"";position:absolute;border-radius:9999px;filter:blur(120px);pointer-events:none;z-index:0}
    body::before{top:-20%;left:-10%;width:480px;height:480px;background:rgba(100,255,218,.08)}
    body::after{bottom:-25%;right:-10%;width:520px;height:520px;background:rgba(124,58,237,.08)}
    main{position:relative;z-index:1;max-width:40rem}
    .badge{display:inline-block;padding:.25rem .75rem;border:1px solid rgba(100,255,218,.3);border-radius:9999px;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:#64ffda;margin-bottom:1.5rem;font-family:'JetBrains Mono',ui-monospace,monospace}
    .code{font-size:clamp(5rem,18vw,10rem);font-weight:800;line-height:1;letter-spacing:-.04em;background:linear-gradient(135deg,#64ffda 0%,#7c3aed 100%);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 1rem}
    h1{font-size:clamp(1.5rem,4vw,2.25rem);margin:0 0 .75rem;font-weight:700;letter-spacing:-.02em}
    p{color:rgba(255,255,255,.72);line-height:1.6;margin:0 0 2rem;font-size:1.0625rem}
    .actions{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin-bottom:2.5rem}
    a.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.875rem 1.75rem;border-radius:.5rem;font-weight:600;text-decoration:none;transition:transform .1s ease,box-shadow .2s ease,background .2s ease}
    a.primary{background:#64ffda;color:#0a0a1a}
    a.primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(100,255,218,.3)}
    a.outline{border:1px solid rgba(255,255,255,.15);color:#fff}
    a.outline:hover{border-color:#64ffda;color:#64ffda;transform:translateY(-2px)}
    nav{display:flex;flex-wrap:wrap;gap:1.5rem;justify-content:center;font-size:.875rem}
    nav a{color:rgba(255,255,255,.6);text-decoration:none;transition:color .2s ease}
    nav a:hover{color:#64ffda;text-decoration:underline;text-underline-offset:4px}
    small{display:block;margin-top:3rem;color:rgba(255,255,255,.4);font-size:.75rem}
  </style>
</head>
<body>
  <main>
    <span class="badge">Error 404</span>
    <p class="code" aria-hidden="true">404</p>
    <h1>This page wandered off</h1>
    <p>The link is broken or the page moved. Pick up where you left off below.</p>
    <div class="actions">
      <a class="btn primary" href="/">← Back to home</a>
      <a class="btn outline" href="/contact">Contact support</a>
    </div>
    <nav aria-label="Sitemap">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/contact">Contact</a>
      <a href="/sitemap.xml">Sitemap</a>
    </nav>
    <small>{BUSINESS_NAME} · {BUSINESS_URL}</small>
  </main>
</body>
</html>
